<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多多手作烘培 | 溫暖你的每一天</title>
    <meta id="meta-description" name="description" content="">
    <meta id="meta-keywords" name="keywords" content="">
    <meta id="meta-og-title" property="og:title" content="">
    <meta id="meta-og-description" property="og:description" content="">
    <meta property="og:type" content="website">
    <meta id="meta-og-image" property="og:image" content="">
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">
            <img id="logo-image" src="images/Logo.jpg" alt="多多手作烘培">
            <span id="brand-name">多多手作烘培</span>
        </div>
        <nav>
            <ul>
                <li><a href="#about">品牌故事</a></li>
                <li><a href="#menu">甜點目錄</a></li>
                <li><a href="#trust">安心資訊</a></li>
                <li><a href="#order">訂購方式</a></li>
            </ul>
        </nav>
    </header>

    <section id="hero">
        <div class="hero-content">
            <h1 id="hero-title">用純粹的食材，烘焙真實的溫暖</h1>
            <p id="hero-subtitle">每一份甜點，都是專屬您的等待</p>
        </div>
    </section>

    <section id="about" data-aos="fade-up">
        <h2 id="about-title">關於多多</h2>
        <div id="about-content"></div>
    </section>

    <section id="menu">
        <h2 id="menu-title">甜點目錄</h2>
        <p id="menu-notice" class="notice">※ 所有甜點皆為<b>聯絡後接單製作</b>，以確保最高品質與新鮮度 ※</p>
        <p id="category-tip" class="category-tip">點擊下方分類可查看更多品項與照片</p>
        
        <div id="category-grid" class="product-grid"></div>
    </section>

    <section id="catalog-details">
        <h2 id="category-title">更多品項｜胭脂鳳梨乾</h2>
        <div id="category-panels"></div>
    </section>

    <section id="trust">
        <h2 id="trust-title">安心資訊</h2>
        <p id="trust-intro"></p>
        <div id="trust-grid" class="trust-grid"></div>
    </section>

    <section id="order" data-aos="fade-up">
        <h2 id="order-title">如何訂購</h2>
        <p id="order-intro">為了給您最好的品質，所有甜點請提前至少 3 個工作天預約。</p>
        <div class="contact-methods">
            <div id="order-steps" class="order-steps"></div>
            
            <div id="contact-links" class="social-links"></div>
        </div>
    </section>

    <a href="#" class="floating-btn">💬 Line 預約</a>

    <footer>
        <p id="footer-text">&copy; 2026 多多手作烘培 Duoduo Bakery. All Rights Reserved.</p>
    </footer>

    <div id="lightbox" class="lightbox" aria-hidden="true">
        <div class="lightbox-content" role="dialog" aria-modal="true" aria-label="產品照片預覽">
            <button id="lightbox-close" class="lightbox-close" type="button" aria-label="關閉預覽">×</button>
            <img id="lightbox-image" src="" alt="">
            <p id="lightbox-caption"></p>
        </div>
    </div>

    <script src="site-data.js"></script>
    <script src="script.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 800, once: true });</script>

</body>
</html>
