<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上傳照片給 Yuko</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100dvh;
            background: linear-gradient(135deg, #f5f0eb 0%, #ebe4dc 100%);
            font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.10);
            padding: 40px 32px 36px;
            width: 100%;
            max-width: 480px;
            text-align: center;
        }

        .icon { font-size: 52px; margin-bottom: 12px; }

        h2 {
            font-size: 1.5rem;
            color: #2d2d2d;
            font-weight: 700;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        #upload_btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 320px;
            padding: 16px 24px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #3448C5, #5B6FE0);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        #upload_btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(52,72,197,0.3);
        }

        #feedback {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.95rem;
            display: none;
        }
        #feedback.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        #feedback.error {
            display: block;
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }

        #results {
            margin-top: 28px;
            text-align: left;
        }
        #results h3 {
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 14px;
        }
        .result-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px;
            background: #f8f9ff;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .result-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .result-info {
            flex: 1;
            overflow: hidden;
        }
        .result-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .result-size {
            font-size: 0.78rem;
            color: #aaa;
            margin-top: 2px;
        }
        .copy-btn {
            flex-shrink: 0;
            padding: 7px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #3448C5;
            background: #e8ebff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.15s;
        }
        .copy-btn:active { background: #c7cdff; }
        .copy-btn.copied { color: #2e7d32; background: #e8f5e9; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📸</div>
        <h2>上傳照片給 Yuko</h2>
        <p class="subtitle">支援 JPG、PNG、HEIC 等格式，可一次上傳多張</p>

        <button id="upload_btn">
            <span>＋</span> 選擇照片上傳
        </button>

        <div id="feedback"></div>
        <div id="results" style="display:none">
            <h3>本次上傳（<span id="count">0</span> 張）</h3>
            <div id="result-list"></div>
        </div>
    </div>

    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script>
        var uploadCount = 0;

        var myWidget = cloudinary.createUploadWidget({
            cloudName: 'dztmtyiuh',
            uploadPreset: 'ForYuko',
            language: 'zh_TW',
            sources: ['local', 'camera'],
            multiple: true,
            maxFiles: 20,
            clientAllowedFormats: ['jpg', 'jpeg', 'png', 'heic', 'heif', 'webp', 'gif'],
            styles: {
                palette: {
                    window: '#FFFFFF',
                    windowBorder: '#E0E0E0',
                    tabIcon: '#3448C5',
                    menuIcons: '#5A5A5A',
                    textDark: '#2D2D2D',
                    textLight: '#F5F5F5',
                    link: '#3448C5',
                    action: '#3448C5',
                    inactiveTabIcon: '#AAAAAA',
                    error: '#E53935',
                    inProgress: '#3448C5',
                    complete: '#43A047',
                    sourceBg: '#F8F9FF'
                }
            }
        }, (error, result) => {
            var feedback = document.getElementById('feedback');

            if (error) {
                feedback.textContent = '❌ 上傳失敗：' + (error.statusText || error.message || '請重試');
                feedback.className = 'error';
                return;
            }

            if (result && result.event === 'success') {
                var info = result.info;
                uploadCount++;

                document.getElementById('count').textContent = uploadCount;
                document.getElementById('results').style.display = 'block';

                feedback.textContent = '✅ 已成功上傳 ' + uploadCount + ' 張照片！';
                feedback.className = 'success';

                var item = document.createElement('div');
                item.className = 'result-item';

                var sizeMB = (info.bytes / 1024 / 1024).toFixed(2);
                var secureUrl = info.secure_url;
                var thumbUrl = secureUrl.replace('/upload/', '/upload/w_120,h_120,c_fill/');

                item.innerHTML =
                    '<img src="' + thumbUrl + '" alt="上傳照片" loading="lazy">' +
                    '<div class="result-info">' +
                        '<div class="result-name">' + (info.original_filename || '照片') + '</div>' +
                        '<div class="result-size">' + sizeMB + ' MB</div>' +
                    '</div>' +
                    '<button class="copy-btn" data-url="' + secureUrl + '">複製連結</button>';

                document.getElementById('result-list').prepend(item);

                item.querySelector('.copy-btn').addEventListener('click', function() {
                    var btn = this;
                    navigator.clipboard.writeText(btn.dataset.url).then(function() {
                        btn.textContent = '已複製！';
                        btn.classList.add('copied');
                        setTimeout(function() {
                            btn.textContent = '複製連結';
                            btn.classList.remove('copied');
                        }, 2000);
                    });
                });
            }
        });

        document.getElementById('upload_btn').addEventListener('click', function() {
            myWidget.open();
        });
    </script>
</body>
</html>
