<!DOCTYPE html>
<html>
<head>
    <title>上傳照片給 Yuko</title>
</head>
<body style="text-align: center; padding: 50px; font-family: sans-serif;">

    <h2>📸 點擊下方按鈕上傳照片</h2>
    
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>  

    <button id="upload_widget" style="padding: 15px 30px; font-size: 18px; cursor: pointer; background: #3448C5; color: white; border: none; border-radius: 5px;">
        上傳照片
    </button>

    <script type="text/javascript">  
    var myWidget = cloudinary.createUploadWidget({
      cloudName: 'dztmtyiuh', // <--- 這裡填入你的 Cloud Name
      uploadPreset: 'ForYuko'     // <--- 已經幫你填好 Preset 了
    }, (error, result) => { 
        if (!error && result && result.event === "success") { 
          alert('上傳成功！');
          console.log('圖片資訊: ', result.info); 
        }
      }
    )

    document.getElementById("upload_widget").addEventListener("click", function(){
        myWidget.open();
      }, false);
    </script>
</body>
</html>
